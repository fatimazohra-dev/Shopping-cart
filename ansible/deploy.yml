---
- name: Déploiement Shopping Cart avec Ansible
  hosts: webservers
  become: no
  connection: ssh

  vars:
    app_name: shopping-cart
    app_port: 8070
    docker_image: "mlamrini/shopping-cart:latest"

  tasks:
    - name: Afficher le début du déploiement
      debug:
        msg: "Déploiement de {{ app_name }} sur {{ inventory_hostname }}"

    - name: Installer Docker
      raw: apk add --no-cache docker || true

    - name: Arrêter l'ancien conteneur
      raw: docker stop {{ app_name }} || true

    - name: Supprimer l'ancien conteneur
      raw: docker rm {{ app_name }} || true

    - name: Lancer le nouveau conteneur
      raw: |
        docker run -d \
          --name {{ app_name }} \
          -p {{ app_port }}:{{ app_port }} \
          --restart always \
          {{ docker_image }}

    - name: Vérifier le déploiement
      raw: docker ps | grep {{ app_name }}

    - name: Afficher le résultat
      debug:
        msg: "Application déployée avec succès sur le port {{ app_port }}"
